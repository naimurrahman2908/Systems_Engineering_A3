name: Build LaTeX PDF

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Compile LaTeX
        uses: xu-cheng/latex-action@v3
        with:
          root_file: main.tex
          working_directory: LineFollowingRobot_Report

      - name: Upload PDF
        uses: actions/upload-artifact@v4
        with:
          name: LineFollowingRobotReport
          path: LineFollowingRobot_Report/*.pdf
